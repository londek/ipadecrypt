# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ipadecrypt

before:
  hooks:
    - go mod tidy
    - ./helper/build.sh
    - cp helper/dist/ipadecrypt-helper-arm64 internal/device/ipadecrypt-helper-arm64

builds:
  - id: ipadecrypt
    main: ./cmd/ipadecrypt
    binary: ipadecrypt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - arm64
      - amd64
      - "386"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version=v{{.Version}}

archives:
  - formats: binary

checksum:
  name_template: checksums.txt
  extra_files:
    - glob: helper/dist/ipadecrypt-helper-arm64
      name_template: ipadecrypt-helper-arm64

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: londek
    name: ipadecrypt
  draft: true
  prerelease: auto
  extra_files:
    - glob: helper/dist/ipadecrypt-helper-arm64
      name_template: ipadecrypt-helper-arm64
